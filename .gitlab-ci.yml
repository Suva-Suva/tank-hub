# .gitlab-ci.yml
stages:
  - lint
  - test
  - deploy

variables:
  POSTGRES_DB: game_portal_test
  POSTGRES_USER: runner
  POSTGRES_PASSWORD: ""
  POSTGRES_HOST_AUTH_METHOD: trust
  RAILS_ENV: test
  RUBY_VERSION: "3.4.9"
  BUNDLE_PATH: vendor/bundle
  BUNDLE_JOBS: 4
  BUNDLE_RETRY: 3
  CC_TEST_REPORTER_ID: ${CC_TEST_REPORTER_ID:-}

# Кэширование зависимостей
cache:
  key: "ruby-${RUBY_VERSION}-bundler-${CI_COMMIT_REF_SLUG}"
  paths:
    - vendor/bundle
    - .bundle/
    - node_modules/

# Образ с нужными версиями
.default_image: &default_image
  image: ruby:${RUBY_VERSION}-alpine
  services:
    - postgres:15-alpine

before_script:
  - apk add --no-cache build-base postgresql-dev git nodejs npm yarn
  - ruby -v
  - bundle config set --local path 'vendor/bundle'
  - bundle install --jobs 4 --retry 3

# === LINT ===
lint:standard:
  <<: *default_image
  stage: lint
  script:
    - bundle exec standardrb --format progress --format simple --out rubocop-report.txt
  artifacts:
    paths:
      - rubocop-report.txt
    when: always
    expire_in: 1 week
  allow_failure: false

# === TEST ===
test:rspec:
  <<: *default_image
  stage: test
  variables:
    DATABASE_URL: postgresql://runner:@postgres:5432/game_portal_test
  before_script:
    - apk add --no-cache build-base postgresql-dev git nodejs npm yarn
    - bundle config set --local path 'vendor/bundle'
    - bundle install --jobs 4 --retry 3
    - bin/rails db:create db:migrate RAILS_ENV=test
  script:
    - bundle exec rspec 
        --format progress 
        --format RspecJunitFormatter 
        --out rspec-report.xml
        --profile
  artifacts:
    when: always
    paths:
      - rspec-report.xml
      - coverage/
      - log/test.log
    reports:
      junit: rspec-report.xml
    expire_in: 30 days
  coverage: '/LOC \((\d+\.\d+%)\) covered/'

# === DEPLOY (placeholder) ===
deploy:staging:
  <<: *default_image
  stage: deploy
  environment:
    name: staging
    url: https://api-staging.example.com
  script:
    - echo "🚀 Deploy to staging (placeholder)"
    - |
      if [ -n "$DEPLOY_SCRIPT" ]; then
        eval "$DEPLOY_SCRIPT"
      fi
  only:
    - main
  when: manual
  dependencies:
    - test:rspec