# .gitlab-ci.yml
stages:
  - lint
  - test
  - deploy

variables:
  POSTGRES_DB: game_portal_test
  POSTGRES_USER: runner
  POSTGRES_PASSWORD: ""
  POSTGRES_HOST_AUTH_METHOD: trust
  RAILS_ENV: test
  RUBY_VERSION: "3.4.9"
  BUNDLE_PATH: vendor/bundle
  BUNDLE_JOBS: 4
  BUNDLE_RETRY: 3
  # Отключаем интерактивные подсказки bundler
  BUNDLE_FORCE_RUBY_PLATFORM: "1"

# Кэширование: разделяем bundler и node_modules
cache:
  key: "ruby-${RUBY_VERSION}-${CI_COMMIT_REF_SLUG}"
  paths:
    - vendor/bundle
    - .bundle/
    - node_modules/
  policy: pull-push

# === Базовый шаблон для всех джоб ===
.default: &default
  image: ruby:${RUBY_VERSION}-slim
  services:
    - postgres:15-alpine
  variables:
    DATABASE_URL: postgresql://runner:@postgres:5432/${POSTGRES_DB}
  before_script:
    # Обновляем пакеты и ставим только необходимое для компиляции гемов
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends
        build-essential
        libpq-dev
        git
        curl
        gnupg2
    - apt-get clean && rm -rf /var/lib/apt/lists/*
    
    # Настраиваем bundler
    - bundle config set --local path 'vendor/bundle'
    - bundle config set --local jobs 4
    - bundle config set --local retry 3
    
    # Устанавливаем зависимости
    - bundle install

# === LINT ===
lint:standard:
  <<: *default
  stage: lint
  script:
    - bundle exec standardrb --format progress --format simple --out rubocop-report.txt
  artifacts:
    paths:
      - rubocop-report.txt
    when: always
    expire_in: 1 week
  allow_failure: false

# === TEST ===
test:rspec:
  <<: *default
  stage: test
  variables:
    RAILS_ENV: test
    DATABASE_URL: postgresql://runner:@postgres:5432/game_portal_test
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends
        build-essential
        libpq-dev
        git
        curl
        gnupg2
    - apt-get clean && rm -rf /var/lib/apt/lists/*
    
    - bundle config set --local path 'vendor/bundle'
    - bundle config set --local jobs 4
    - bundle config set --local retry 3
    - bundle install
    
    # Подготовка тестовой БД
    - bin/rails db:create db:migrate RAILS_ENV=test
  script:
    - bundle exec rspec 
        --format progress 
        --format RspecJunitFormatter 
        --out rspec-report.xml
        --profile
  artifacts:
    when: always
    paths:
      - rspec-report.xml
      - coverage/
      - log/test.log
    reports:
      junit: rspec-report.xml
    expire_in: 30 days
  coverage: '/LOC \((\d+\.\d+%)\) covered/'

# === DEPLOY (placeholder) ===
deploy:staging:
  <<: *default
  stage: deploy
  environment:
    name: staging
    url: https://api-staging.example.com
  script:
    - echo "🚀 Deploy to staging (placeholder)"
    - |
      if [ -n "$DEPLOY_SCRIPT" ]; then
        eval "$DEPLOY_SCRIPT"
      fi
  only:
    - main
  when: manual
  dependencies:
    - test:rspec